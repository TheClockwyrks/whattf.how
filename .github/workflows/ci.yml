name: CI

# Build validation, run on GitHub (the repo is mirrored here from Azure DevOps).
# Two jobs: the Rust crates (format, clippy, tests) and the static site build
# (which compiles the wasm crates, then runs `astro build` — type-checking and
# bundling in one step). A green run means the crates build and test and the site
# builds with the freshly compiled wasm.
on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust crates (fmt, clippy, test)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml selects the channel, components, and wasm target.
      - name: Show toolchain
        run: rustc --version && cargo --version
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  site:
    name: Site (wasm + astro build)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - run: npm ci
      # `npm run build` compiles the wasm crates (build:wasm) then builds the
      # static site into apps/site/dist.
      - run: npm run build
