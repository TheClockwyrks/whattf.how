name: Deploy

# Builds the static site (wasm crates + astro) and deploys it to Cloudflare Pages
# with wrangler. Runs on pushes to master and on demand.
#
# Gated on the `CF_DEPLOY` repository variable so the workflow stays dormant until
# you opt in — set it once the GitHub mirror and Cloudflare project exist:
#   Settings → Secrets and variables → Actions
#     Variables: CF_DEPLOY = true
#     Secrets:   CLOUDFLARE_API_TOKEN   (token with the "Cloudflare Pages: Edit" permission)
#                CLOUDFLARE_ACCOUNT_ID  (the account that owns the Pages project)
# Also create the Pages project once (Direct Upload):
#   wrangler pages project create whattf-how --production-branch=master
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Allow one deployment at a time; let an in-progress run finish.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: vars.CF_DEPLOY == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Add wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: latest
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/site/dist --project-name=whattf-how --branch=master
